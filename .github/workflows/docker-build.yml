name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: [self-hosted, arm64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5.6.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GOPROXY=https://goproxy.io,direct
      - name: Update ArgoCD Manifest
        env:
          # 关键：这里直接写死成获取 sha 并截取
          NEW_TAG: sha-${{ github.sha }}
        run: |
          # 在 shell 里直接处理成 7 位
          TAG_7=$(echo ${{ github.sha }} | cut -c1-7)
          FINAL_TAG="sha-${TAG_7}"
          
          cd /home/ubuntu/argo
          git pull origin main
          
          sed -i "s|image: ghcr.io/jesse20250808/usermgr:.*|image: ghcr.io/jesse20250808/usermgr:${FINAL_TAG}|g" services/usermgr/deployment.yaml
          
          # 检查是否真的改了，避免 "nothing to commit" 报错
          git add .
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: update image to ${FINAL_TAG} [skip ci]"
            git push origin main
          fi

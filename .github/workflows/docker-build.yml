name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: [self-hosted, arm64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5.6.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GOPROXY=https://goproxy.io,direct
      - name: Update ArgoCD Manifest
        run: |
          # 1. 定义变量
          TAG_7=$(echo ${{ github.sha }} | cut -c1-7)
          FINAL_TAG="sha-${TAG_7}"
          
          # 2. 初始化 SSH (确保使用你挂载的 key)
          mkdir -p ~/.ssh
          cp /home/runner/.ssh-keys/argocd-repo-key ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          
          # 3. 配置 Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 强制 Git 使用特定的私钥
          git config --global core.sshCommand "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes"

          # 4. 在当前工作目录 Clone (不要写死 /home/ubuntu)
          # 使用临时目录，避免残留
          git clone git@github.com:jesse20250808/argo.git argo_dir
          cd argo_dir
          
          # 5. 修改文件 (请检查你的路径是否正确)
          sed -i "s|image: ghcr.io/jesse20250808/usermgr:.*|image: ghcr.io/jesse20250808/usermgr:${FINAL_TAG}|g" services/usermgr/deployment.yaml
          
          # 6. 提交并推送
          git add .
          git commit -m "chore: update usermgr image to ${FINAL_TAG} [skip ci]"
          git push origin main
